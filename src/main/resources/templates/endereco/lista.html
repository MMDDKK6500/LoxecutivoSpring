<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Endereços</title>
</head>
<body>

<h1>Endereços</h1>

<a th:href="@{/enderecos/novo}">Novo endereço</a>

<table border="1">
<thead>
<tr>
    <th>ID</th>
    <th>Rua</th>
    <th>Número</th>
    <th>Bairro</th>
    <th>Cidade</th>
    <th>UF</th>
    <th>Ações</th>
</tr>
</thead>
<tbody>
<tr th:each="endereco : ${enderecos}">
    <td th:text="${endereco.id}"></td>
    <td th:text="${endereco.rua}"></td>
    <td th:text="${endereco.numero}"></td>
    <td th:text="${endereco.bairro}"></td>
    <td th:text="${endereco.cidade}"></td>
    <td th:text="${endereco.uf}"></td>
    <td>
        <a th:href="@{/enderecos/editar/{id}(id=${endereco.id})}">Editar</a>
        <a th:href="@{/enderecos/deletar/{id}(id=${endereco.id})}">Deletar</a>
    </td>
</tr>
</tbody>
</table>

</body>
</html>
