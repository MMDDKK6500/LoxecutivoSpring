<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de Veículo</title>
</head>
<body>

<h1 th:text="${veiculo.idPlaca} != null ? 'Editar Veículo' : 'Novo Veículo'"></h1>

<form th:action="@{${veiculo.idPlaca} != null ? '/veiculos/atualizar/' + ${veiculo.idPlaca} : '/veiculos'}"
      th:object="${veiculo}"
      method="post">

    <label for="idPlaca">Placa:</label>
    <input type="text" id="idPlaca" th:field="*{idPlaca}" required/>
    <div th:if="${#fields.hasErrors('idPlaca')}" th:errors="*{idPlaca}"></div>

    <label for="modelo">Modelo:</label>
    <input type="text" id="modelo" th:field="*{modelo}" required/>
    <div th:if="${#fields.hasErrors('modelo')}" th:errors="*{modelo}"></div>

    <label for="ano">Ano:</label>
    <input type="number" id="ano" th:field="*{ano}" required/>
    <div th:if="${#fields.hasErrors('ano')}" th:errors="*{ano}"></div>

    <label for="marca">Marca:</label>
    <input type="text" id="marca" th:field="*{marca}" required/>
    <div th:if="${#fields.hasErrors('marca')}" th:errors="*{marca}"></div>

    <label for="cor">Cor:</label>
    <input type="text" id="cor" th:field="*{cor}" required/>
    <div th:if="${#fields.hasErrors('cor')}" th:errors="*{cor}"></div>

    <button type="submit">Salvar</button>
    <a th:href="@{/veiculos}">Cancelar</a>

</form>

</body>
</html>
