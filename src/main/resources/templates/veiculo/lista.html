<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Veículos</title>
</head>
<body>

<h1>Veículos</h1>

<a th:href="@{/veiculos/novo}">Novo Veículo</a>

<table border="1">
    <thead>
    <tr>
        <th>Placa</th>
        <th>Modelo</th>
        <th>Ano</th>
        <th>Marca</th>
        <th>Cor</th>
        <th>Ações</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="veiculo : ${veiculos}">
        <td th:text="${veiculo.idPlaca}"></td>
        <td th:text="${veiculo.modelo}"></td>
        <td th:text="${veiculo.ano}"></td>
        <td th:text="${veiculo.marca}"></td>
        <td th:text="${veiculo.cor}"></td>

        <td>
            <a th:href="@{/veiculos/editar/{id}(id=${veiculo.idPlaca})}">Editar</a>
            <a th:href="@{/veiculos/deletar/{id}(id=${veiculo.idPlaca})}">Deletar</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
