<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de Passageiro</title>
</head>
<body>

<h1 th:text="${passageiro.id} != null ? 'Editar Passageiro' : 'Novo Passageiro'"></h1>

<form th:action="@{${passageiro.id} != null ? '/passageiros/atualizar/' + ${passageiro.id} : '/passageiros'}"
      th:object="${passageiro}"
      method="post">

    <label for="nome">Nome:</label>
    <input type="text" id="nome" th:field="*{nome}" required/>
    <div th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>

    <label for="sobrenome">Sobrenome:</label>
    <input type="text" id="sobrenome" th:field="*{sobrenome}" required/>
    <div th:if="${#fields.hasErrors('sobrenome')}" th:errors="*{sobrenome}"></div>

    <label for="numero">Número:</label>
    <input type="text" id="numero" th:field="*{numero}" required/>
    <div th:if="${#fields.hasErrors('numero')}" th:errors="*{numero}"></div>

    <label for="empresa">Empresa:</label>
    <input type="text" id="empresa" th:field="*{empresa}" required/>
    <div th:if="${#fields.hasErrors('empresa')}" th:errors="*{empresa}"></div>

    <label for="rg">RG:</label>
    <input type="text" id="rg" th:field="*{rg}" required/>
    <div th:if="${#fields.hasErrors('rg')}" th:errors="*{rg}"></div>

    <label for="cpf">CPF:</label>
    <input type="text" id="cpf" th:field="*{cpf}" required/>
    <div th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></div>

    <label for="idViagem">Viagem:</label>
    <select id="idViagem" th:field="*{idViagem}" required>
        <option value="">Selecione uma viagem</option>
        <option th:each="viagem : ${viagens}"
                th:value="${viagem.id}"
                th:text="${viagem.id}">
        </option>
    </select>

    <button type="submit">Salvar</button>
    <a th:href="@{/passageiros}">Cancelar</a>

</form>

</body>
</html>
