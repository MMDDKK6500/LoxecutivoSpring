<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Gestão de Eventos</title>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <h2 th:text="${evento.id} != null ? 'Editar Evento' : 'Novo Evento'">Gestão de Eventos</h2>

    <form class="evento-form" th:action="@{${evento.id} != null ? '/eventos/atualizar/' + ${evento.id} : '/eventos'}"
          th:object="${evento}" method="post">

        <!-- IDs Ocultos -->
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{idEndereco.id}" />

        <!-- Dados do Evento -->
        <div class="form-group">
            <label for="nome">Nome do Evento:</label>
            <input type="text" id="nome" th:field="*{nome}" placeholder="Ex: Show de Rock" required/>
            <span class="error-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>

        <h3 class="section-title">Endereço</h3>

        <div class="form-group">
            <label for="rua">Rua:</label>
            <input type="text" id="rua" th:field="*{idEndereco.rua}" placeholder="Nome da rua" required/>
        </div>

        <div class="form-row">
            <div class="form-group half-width">
                <label for="numero">Número:</label>
                <input type="number" id="numero" th:field="*{idEndereco.numero}" required/>
            </div>
            <div class="form-group half-width">
                <label for="uf">UF:</label>
                <input type="text" id="uf" th:field="*{idEndereco.uf}" maxlength="2" placeholder="Ex: SP" required/>
            </div>
        </div>

        <div class="form-group">
            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" th:field="*{idEndereco.bairro}" required/>
        </div>

        <div class="form-group">
            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" th:field="*{idEndereco.cidade}" required/>
        </div>

        <!-- Botões -->
        <div class="form-actions">
            <button type="submit" class="btn btn-save">Salvar</button>
            <a th:href="@{/}" class="btn btn-cancel">Cancelar</a>
        </div>
    </form>

    <!-- Linha divisória -->
    <hr class="divider">

    <!-- NOVO: Seletor de Eventos -->
    <div class="evento-selector">
        <label for="listaEventos">Navegar pelos Eventos:</label>
        <select id="listaEventos" onchange="location = this.value;">
            <option value="/">✨ Criar Novo Evento</option>
            <!-- O th:selected mantém selecionado o evento que você está editando no momento -->
            <option th:each="ev : ${listaEventos}"
                    th:value="@{/{id}(id=${ev.id})}"
                    th:text="${ev.nome}"
                    th:selected="${ev.id == evento.id}">
            </option>
        </select>
    </div>

</aside>

<!-- Main Section -->
<div class="main">
    <nav class="navbar">
        <div class="logo">MySite</div>
        <div class="search-box">
            <input type="text" placeholder="Search..." />
        </div>
    </nav>
    <section class="content">
        <h1>Painel Principal</h1>
        <p>Selecione um evento na barra lateral ou crie um novo.</p>
    </section>
</div>

</body>
</html>
