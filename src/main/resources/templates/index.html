<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <title>Navbar + Sidebar Layout</title>
    </head>

    <body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Menu</h2>

        <form th:action="@{${evento.id} != null ? '/eventos/atualizar/' + ${evento.id} : '/eventos'}"
              th:object="${evento}" method="post">

            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" th:field="*{nome}" required/>
            <br>
            <div th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
            <br>


            <!-- Fazer funcionar ainda -->
            <label for="idEndereco.rua">Rua:</label>
            <br>
            <input type="text" id="idEndereco.rua" th:field="*{idEndereco.rua}" required/>
            <br>
            <div th:if="${#fields.hasErrors('idEndereco.rua')}" th:errors="*{idEndereco.rua}"></div>
            <br>

            <label for="idEndereco.numero">Número:</label>
            <br>
            <input type="number" id="idEndereco.numero" th:field="*{idEndereco.numero}" required/>
            <br>
            <div th:if="${#fields.hasErrors('idEndereco.numero')}" th:errors="*{idEndereco.numero}"></div>
            <br>

            <label for="idEndereco.bairro">Bairro:</label>
            <br>
            <input type="text" id="idEndereco.bairro" th:field="*{idEndereco.bairro}" required/>
            <br>
            <div th:if="${#fields.hasErrors('idEndereco.bairro')}" th:errors="*{idEndereco.bairro}"></div>
            <br>

            <label for="idEndereco.cidade">Cidade:</label>
            <br>
            <input type="text" id="idEndereco.cidade" th:field="*{idEndereco.cidade}" required/>
            <br>
            <div th:if="${#fields.hasErrors('idEndereco.cidade')}" th:errors="*{idEndereco.cidade}"></div>
            <br>

            <label for="idEndereco.uf">UF:</label>
            <br>
            <input type="text" id="idEndereco.uf" th:field="*{idEndereco.uf}" required/>
            <br>
            <div th:if="${#fields.hasErrors('idEndereco.uf')}" th:errors="*{idEndereco.uf}"></div>
            <br>

            <button type="submit">Salvar</button>
        </form>



    </aside>

    <!-- Main Section -->
    <div class="main">

        <!-- Top Navbar -->
        <nav class="navbar">
            <div class="logo">MySite</div>

            <div class="search-box">
                <input type="text" placeholder="Search..." />
            </div>
        </nav>

        <!-- Content -->
        <section class="content">
            <h1>Welcome</h1>
            <p>Your page content goes here.</p>
        </section>

    </div>

    </body>
</html>
